name: Android Release Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: JDK 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # GitHub cache servisi hata verdiği durumlarda derlemeyi durdurmaması için boş bırakıldı
        cache: '' 

    - name: Gradle Kurulumu
      uses: gradle/actions/setup-gradle@v3
      with:
        # Proje seviyesindeki Gradle sürümüyle uyumlu
        gradle-version: 8.5

    - name: Gradle Wrapper İzinlerini Ayarla
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Debug APK Derle
      # --no-daemon ve --no-build-cache kullanarak temiz bir derleme sağlıyoruz
      run: ./gradlew assembleDebug --stacktrace --no-daemon --no-build-cache

    - name: GitHub Release Oluştur
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: KingShot Release v${{ github.run_number }}
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
